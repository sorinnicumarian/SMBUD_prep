name: Deploy ExamPrep to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'ExamPrep/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ExamPrep
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ExamPrep/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build data for all courses
        run: pnpm build:data
      - name: Build app
        run: BASE_PATH=/ExamPrep/ pnpm build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ExamPrep/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
